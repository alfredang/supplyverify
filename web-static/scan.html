<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scan QR · Supply Verify</title>
<link rel="stylesheet" href="css/styles.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/wallet.js"></script>
<script src="js/contract.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" data-sidebar></aside>
  <div style="flex:1;display:flex;flex-direction:column">
    <header class="topbar" data-topbar></header>
    <main class="app-main">
      <div class="card p-6 max-w-xl">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="qr-code" style="width:1.25rem;height:1.25rem;color:#2563eb"></i>
          <h2 class="font-semibold text-slate-100">Point camera at product QR</h2>
        </div>
        <div id="qr-reader" style="border-radius:.5rem;overflow:hidden;background:black"></div>
        <p id="err" class="mt-3 text-sm" style="color:#fca5a5"></p>
      </div>
    </main>
  </div>
</div>
<script>
renderShell({ title: "Scan QR", active: "scan" });
window.Wallet.renderAllButtons();
lucide.createIcons();

const errEl = document.getElementById("err");
try {
  const scanner = new Html5Qrcode("qr-reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      scanner.stop().then(() => {
        try {
          const url = new URL(text);
          location.href = url.pathname + url.search;
        } catch {
          if (/^0x[a-fA-F0-9]{64}$/.test(text)) {
            location.href = `verify-detail.html?id=${text}`;
          } else {
            errEl.textContent = "Unrecognised QR content: " + text;
          }
        }
      });
    },
    () => {}
  ).catch((e) => { errEl.textContent = e.message || "Camera unavailable"; });
} catch (e) {
  errEl.textContent = e.message || "Scanner failed to start";
}
</script>
</body>
</html>
