<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin · Supply Verify</title>
<link rel="stylesheet" href="css/styles.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/wallet.js"></script>
<script src="js/contract.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" data-sidebar></aside>
  <div style="flex:1;display:flex;flex-direction:column">
    <header class="topbar" data-topbar></header>
    <main class="app-main">
      <div id="content"></div>
    </main>
  </div>
</div>
<script>
renderShell({ title: "Admin Dashboard", active: "admin" });
window.Wallet.renderAllButtons();

const content = document.getElementById("content");

function renderForm() {
  content.innerHTML = `
    <div class="grid md:grid-cols-2 gap-4">
      <div class="card p-6">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="shield-check" style="width:1.25rem;height:1.25rem;color:#2563eb"></i>
          <h2 class="font-semibold text-slate-100">Grant supply chain role</h2>
        </div>
        <label class="text-xs text-slate-500">Wallet address</label>
        <input id="wallet" class="field font-mono mt-1" placeholder="0x…" />
        <label class="mt-3 block text-xs text-slate-500">Role</label>
        <select id="role" class="field mt-1">
          <option value="MANUFACTURER">Manufacturer</option>
          <option value="DISTRIBUTOR">Distributor</option>
          <option value="RETAILER">Retailer</option>
        </select>
        <button id="grant" class="btn-primary mt-4">Grant role</button>
      </div>
    </div>`;
  lucide.createIcons();
  document.getElementById("grant").onclick = grant;
}

async function grant() {
  const wallet = document.getElementById("wallet").value.trim();
  const role = document.getElementById("role").value;
  if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) return Toast.error("Invalid wallet address");
  const btn = document.getElementById("grant");
  btn.disabled = true; btn.textContent = "Granting…";
  try {
    const tx = await window.Chain.writeContract().grantRole(window.Chain.roleHash(role), wallet);
    Toast.info("Submitted, waiting for confirmation…");
    await tx.wait();
    Toast.success(`Role granted (tx ${tx.hash.slice(0,10)}…)`);
    document.getElementById("wallet").value = "";
  } catch (e) {
    Toast.error(e.shortMessage || e.message || "Transaction failed");
  } finally {
    btn.disabled = false; btn.textContent = "Grant role";
  }
}

window.Wallet.onChange(async ({ address }) => {
  if (!address) {
    content.innerHTML = `<div class="card p-8 text-center text-slate-300">Connect wallet first.</div>`;
    return;
  }
  const role = await window.Chain.getRole(address);
  if (role !== "admin") {
    content.innerHTML = `<div class="card p-8 text-center text-slate-300">Admin role required.</div>`;
    return;
  }
  renderForm();
});
</script>
</body>
</html>
