<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Transfer · Supply Verify</title>
<link rel="stylesheet" href="css/styles.css?v=2" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/config.js?v=2"></script>
<script src="js/ui.js?v=2"></script>
<script src="js/wallet.js?v=2"></script>
<script src="js/contract.js?v=2"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" data-sidebar></aside>
  <div style="flex:1;display:flex;flex-direction:column">
    <header class="topbar" data-topbar></header>
    <main class="app-main">
      <div id="content"></div>
    </main>
  </div>
</div>
<script>
renderShell({ title: "Transfer Ownership", active: "" });
window.Wallet.renderAllButtons();

const id = new URLSearchParams(location.search).get("id");
const content = document.getElementById("content");

content.innerHTML = `
  <div class="card p-6 max-w-xl space-y-4">
    <p class="text-xs text-slate-500 break-all">Product: ${id || "(missing id)"}</p>
    <div>
      <label class="text-xs text-slate-500">Recipient wallet</label>
      <input id="to" class="field font-mono mt-1" placeholder="0x…" />
    </div>
    <div>
      <label class="text-xs text-slate-500">New status</label>
      <select id="status" class="field mt-1">
        ${window.STATUS_LABELS.map((l,i)=>`<option value="${i}" ${i===3?"selected":""}>${l}</option>`).join("")}
      </select>
    </div>
    <div>
      <label class="text-xs text-slate-500">Location / checkpoint</label>
      <input id="loc" class="field mt-1" />
    </div>
    <button id="go" class="btn-primary">Transfer ownership</button>
  </div>`;

document.getElementById("go").onclick = async () => {
  const to = document.getElementById("to").value.trim();
  if (!/^0x[a-fA-F0-9]{40}$/.test(to)) return Toast.error("Invalid address");
  const status = Number(document.getElementById("status").value);
  const loc = document.getElementById("loc").value;
  const btn = document.getElementById("go");
  btn.disabled = true; btn.textContent = "Submitting…";
  try {
    const tx = await window.Chain.writeContract().transferOwnership(id, to, status, loc);
    Toast.info("Submitted, waiting for confirmation…");
    await tx.wait();
    Toast.success(`Transferred (tx ${tx.hash.slice(0,10)}…)`);
    location.href = `product.html?id=${id}`;
  } catch (e) {
    Toast.error(e.shortMessage || e.message || "Failed");
  } finally {
    btn.disabled = false; btn.textContent = "Transfer ownership";
  }
};
</script>
</body>
</html>
